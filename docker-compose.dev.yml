version: "3.9"

services:
  # API Gateway
  api:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: imprompt-api-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      JWT_SECRET: dev-secret-key-change-in-production
      CORS_ORIGIN: http://localhost:4200,http://localhost:3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ai
      DB_PASSWORD: ai
      DB_NAME: aisaas
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 1000
      LOG_LEVEL: debug
      LOG_FORMAT: simple
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./apps/api-gateway:/app
      - /app/node_modules
    networks:
      - imprompt-generator-app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Worker Agents
  worker:
    build:
      context: ./apps/appsworker-agents
      dockerfile: Dockerfile
    container_name: imprompt-worker-dev
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      WORKER_ID: worker-1-dev
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./apps/appsworker-agents:/app
      - /app/node_modules
    networks:
      - imprompt-generator-app-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: imprompt-postgres-dev
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      POSTGRES_DB: aisaas
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - imprompt-generator-app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: imprompt-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - imprompt-generator-app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama LLM Service
  ollama:
    image: ollama/ollama:latest
    container_name: imprompt-ollama-dev
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - imprompt-generator-app-network
    environment:
      OLLAMA_HOST: 0.0.0.0:11434

volumes:
  postgres-data:
  redis-data:
  ollama-data:

networks:
  imprompt-generator-app-network:
    driver: bridge
